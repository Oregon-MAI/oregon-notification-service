services:

  postgres-notification-service:
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    command: [ "postgres", "-p", "5432" ]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./data:/data
    command: redis-server --appendonly yes --requirepass "redispass"
    restart: unless-stopped

  notification:
    build: .
    restart: unless-stopped
    ports:
      - "8003:8003"
    depends_on:
      - redis
      - kafka
      - postgres-notification-service
    environment:
      - REDIS_PASS=redispass
      - REDIS_URL=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - USER_BOOK_TOPIC=user.book
      - USER_CANCEL_TOPIC=user.cancel
      - ADMIN_CANCEL_TOPIC=admin.cancel
      - ADMIN_UPDATE_TOPIC=admin.update
      - MESSAGES_TOPIC_START=messages
      - MESSAGES_TOPIC_END=messages
      - DATABASE_URL=postgresql+asyncpg://postgres:root@postgres-notification-service:5432/postgres